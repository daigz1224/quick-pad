name: QuickPad
options:
  bundleIdPrefix: dev.quickpad
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  QuickPad:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: QuickPad
        excludes:
          - Info.plist
          - QuickPad.entitlements
    resources:
      - path: QuickPad/Resources
    # The widget extension is embedded into the .app bundle's PlugIns/
    # directory automatically by xcodegen when listed as a dependency.
    dependencies:
      - target: QuickPadWidget
    info:
      path: QuickPad/Info.plist
      properties:
        CFBundleName: QuickPad
        CFBundleDisplayName: QuickPad
        CFBundleIdentifier: dev.quickpad.QuickPad
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "14.0"
        # Launchpad shows the app (LSUIElement: false), but the Dock
        # icon is suppressed at runtime via NSApp.setActivationPolicy(.accessory)
        # in applicationWillFinishLaunching. This combo is the standard
        # menu-bar-app pattern when you still want Launchpad presence.
        LSUIElement: false
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        # URL scheme — widget taps fire `quickpad://open` to bring the
        # popover up.
        CFBundleURLTypes:
          - CFBundleURLName: dev.quickpad.QuickPad.url
            CFBundleURLSchemes:
              - quickpad
    entitlements:
      path: QuickPad/QuickPad.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.quickpad.QuickPad
        PRODUCT_NAME: QuickPad
        INFOPLIST_FILE: QuickPad/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickPad/QuickPad.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES

  QuickPadWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: QuickPadWidget
        excludes:
          - Info.plist
          - QuickPadWidget.entitlements
      # Reused pure-Foundation models + parser. Listed explicitly so
      # this target compiles them too — no duplication, both targets
      # share the source files via the build phases.
      - path: QuickPad/Models/StreamEntry.swift
      - path: QuickPad/Models/StreamSection.swift
      - path: QuickPad/Models/BulletType.swift
      - path: QuickPad/Models/TaskState.swift
      - path: QuickPad/Models/AppURLScheme.swift
      - path: QuickPad/Store/StreamParser.swift
    info:
      path: QuickPadWidget/Info.plist
      properties:
        CFBundleName: QuickPadWidget
        CFBundleDisplayName: QuickPad Widget
        CFBundleIdentifier: dev.quickpad.QuickPad.Widget
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        CFBundlePackageType: XPC!
        LSMinimumSystemVersion: "14.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: QuickPadWidget/QuickPadWidget.entitlements
      properties:
        # Plain sandboxed widget. The main app mirrors stream.md into
        # this extension's own sandbox container at
        # `~/Library/Containers/dev.quickpad.QuickPad.Widget/Data/Documents/`
        # (see `Store/WidgetMirror.swift`), so no entitlement gymnastics
        # are needed — the widget reads its own `.documentDirectory`.
        com.apple.security.app-sandbox: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.quickpad.QuickPad.Widget
        PRODUCT_NAME: QuickPadWidget
        INFOPLIST_FILE: QuickPadWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickPadWidget/QuickPadWidget.entitlements
        SKIP_INSTALL: NO

  QuickPadTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: QuickPadTests
    dependencies:
      - target: QuickPad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.quickpad.QuickPadTests
        PRODUCT_NAME: QuickPadTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/QuickPad.app/Contents/MacOS/QuickPad"
        SWIFT_VERSION: "5.9"

schemes:
  QuickPad:
    build:
      targets:
        QuickPad: all
        QuickPadTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - QuickPadTests
