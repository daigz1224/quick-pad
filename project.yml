name: QuickPad
options:
  bundleIdPrefix: dev.quickpad
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  QuickPad:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: QuickPad
        excludes:
          - Info.plist
          - QuickPad.entitlements
    resources:
      - path: QuickPad/Resources
    info:
      path: QuickPad/Info.plist
      properties:
        CFBundleName: QuickPad
        CFBundleDisplayName: QuickPad
        CFBundleIdentifier: dev.quickpad.QuickPad
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "14.0"
        # Launchpad shows the app (LSUIElement: false), but the Dock
        # icon is suppressed at runtime via NSApp.setActivationPolicy(.accessory)
        # in applicationWillFinishLaunching. This combo is the standard
        # menu-bar-app pattern when you still want Launchpad presence.
        LSUIElement: false
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
    entitlements:
      path: QuickPad/QuickPad.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.quickpad.QuickPad
        PRODUCT_NAME: QuickPad
        INFOPLIST_FILE: QuickPad/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickPad/QuickPad.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES

  QuickPadTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: QuickPadTests
    dependencies:
      - target: QuickPad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.quickpad.QuickPadTests
        PRODUCT_NAME: QuickPadTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/QuickPad.app/Contents/MacOS/QuickPad"
        SWIFT_VERSION: "5.9"

schemes:
  QuickPad:
    build:
      targets:
        QuickPad: all
        QuickPadTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - QuickPadTests
